## proxy_groups ##
custom_proxy_group=🌍Global`select`[]Auto`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他
custom_proxy_group=📢Google`select`[]Auto`[]🌍Global`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他
custom_proxy_group=📕Comic`select`[]Auto`[]🌍Global`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他
custom_proxy_group=🎮Game`select`[]Auto`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他`[]DIRECT
custom_proxy_group=🐦Social`select`[]Auto`[]🌍Global
custom_proxy_group=🎵Spotify`select`[]Auto`[]🌍Global`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他
custom_proxy_group=📱Telegram`select`[]Auto`[]🌍Global
custom_proxy_group=💰PayPal`select`[]Auto`[]🌍Global`[]香港`[]台湾`[]韩国`[]日本`[]新加坡`[]美国`[]其他
custom_proxy_group=🚩Final`select`[]DIRECT`[]🌍Global
custom_proxy_group=📱TelegramSG`select`[]📱Telegram`[]新加坡`http://captive.apple.com`600,,100
custom_proxy_group=📱TelegramUS`select`[]📱Telegram`[]美国`http://captive.apple.com`600,,100
custom_proxy_group=📱TelegramNL`select`[]📱Telegram`[]欧洲`http://captive.apple.com`600,,100

custom_proxy_group=Auto`url-test`(?=.*(香港|澳门|日本|美国|台湾|狮城|韩国))`http://captive.apple.com`600,,100
custom_proxy_group=香港`url-test`(?=.*(香港|澳门))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=日本`url-test`(?=.*(日本))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=美国`url-test`(?=.*(美国))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=台湾`url-test`(?=.*(台湾))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=韩国`url-test`(?=.*(韩国))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=新加坡`url-test`(?=.*(狮城))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=欧洲`url-test`(?=.*(德国|法国|英国))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=zerotier`select`(?=.*(香港|澳门|日本|美国|台湾|狮城|韩国))
custom_proxy_group=其他`select`(?=.*)^((?!(香港|澳门|日本|美国|台湾|狮城|韩国|德国|法国|英国|UnblockMusic)).)*$
